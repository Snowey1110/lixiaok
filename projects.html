<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects & Timeline | Lixiao Kuang</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Orbitron:wght@600&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MWFHJLJY8Y"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-MWFHJLJY8Y');
  </script>
</head>
<body data-experiences-url="data/experiences.json">
  <div id="particles-js"></div>
  <nav class="game-nav" id="navbar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html" aria-current="page">Projects</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
  <main class="fade-in main--timeline">
    <header class="timeline-header">
      <h1>Experience &amp; projects</h1>
    </header>

    <section class="skills" aria-label="Skills">
      <h2>Skills &amp; languages</h2>
      <div class="skill-icons">
        <img src="images/unity.png" alt="Unity" title="Unity" class="skill-icon-img">
        <i class="devicon-csharp-plain colored" title="C#"></i>
        <i class="devicon-cplusplus-plain colored" title="C++"></i>
        <i class="devicon-python-plain colored" title="Python"></i>
        <i class="devicon-html5-plain colored" title="HTML5"></i>
        <i class="devicon-css3-plain colored" title="CSS3"></i>
        <i class="devicon-javascript-plain colored" title="JavaScript"></i>
        <i class="devicon-c-plain colored" title="C"></i>
        <i class="devicon-java-plain colored" title="Java"></i>
      </div>
    </section>

    <section class="projects timeline-section" aria-label="Project and work timeline">
      <h2>Timeline</h2>
      <div class="timeline-search-row">
        <label class="visually-hidden" for="timeline-search">Search</label>
        <input type="search" class="timeline-search" id="timeline-search" name="q" placeholder="Search" autocomplete="off">
      </div>
      <div class="type-filter" id="type-filter" role="group" aria-label="Filter by experience type">
        <button type="button" class="type-btn is-active" data-type="all">All</button>
        <button type="button" class="type-btn" data-type="work">Work</button>
        <button type="button" class="type-btn" data-type="project">Projects</button>
        <button type="button" class="type-btn" data-type="game">Game projects</button>
      </div>
      <div class="active-tag-pills" id="active-tag-pills" role="toolbar" aria-label="Active filters"></div>
      <div class="tag-filter" id="tag-filter" role="group" aria-label="Tags" aria-live="polite">
        <p class="filter-loading">Loading</p>
      </div>
      <div id="timeline-list" class="timeline h-timeline" role="region" aria-label="Project timeline"></div>
    </section>
  </main>
  <footer>
    <p>© 2024 Lixiao Kuang</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="js/particles-init.js"></script>
  <script src="js/fadein.js"></script>
  <script src="js/timeline.js"></script>
</body>
</html>
